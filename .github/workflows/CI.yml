name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
        os:
          - ubuntu-latest
        arch:
          - x64

    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v3

      - uses: julia-actions/julia-buildpkg@v1

      - name: Resolve CondaPkg environment and configure Python library paths
        run: |
          julia --project=. -e '
            using CondaPkg
            CondaPkg.resolve(force=true)
          '
          CONDAPKG_ENV="$PWD/.CondaPkg/.pixi/envs/default"
          test -f "$CONDAPKG_ENV/lib/libexpat.so.1"
          echo "CONDAPKG_ENV=$CONDAPKG_ENV" >> "$GITHUB_ENV"
          echo "LD_PRELOAD=$CONDAPKG_ENV/lib/libexpat.so.1${LD_PRELOAD:+:$LD_PRELOAD}" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$CONDAPKG_ENV/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - uses: julia-actions/julia-runtest@v1
